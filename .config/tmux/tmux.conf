# general options
set -g escape-time 0        # disable delays on escape sequences
set -g mouse on
set -g renumber-windows on  # keep numbering sequential
set -g repeat-time 1000     # increase "prefix-free" window
set -g history-limit 10000

# change prefix
unbind C-b
set -g prefix `
bind ` send-prefix


# start indexes from 1
#TODO: setup hook to renumber sessions
set -g base-index 1
set -g pane-base-index 1


# Theme
#TODO: change fg and bg for selected window
#TODO: have different colours than default
set -g window-status-format "○ #W"
set -g window-status-current-format "● #W"


# other keybindings
bind q detach-client
bind e choose-window -Z


#### Navigation ####

# Pane Selection
bind -n M-Up    select-pane -U
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Right select-pane -R
bind -n M-w select-pane -U
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-d select-pane -R

# Pane Resizing
bind -n M-W resize-pane -U
bind -n M-A resize-pane -L
bind -n M-S resize-pane -D
bind -n M-D resize-pane -R
bind -n M-f resize-pane -Z

# Pane splitting
bind v split-window -h
bind | split-window -h
bind h split-window -v
bind - split-window -v

# Window selection
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
